<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Countdown Timer</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<style>

body{
margin:0;
background:#111;
color:white;
font-family:system-ui;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#timer{
font-weight:600;
white-space:nowrap;
text-align:center;
}

#status{
color:#aaa;
margin-top:6px;
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

#format{
display:block;
margin-top:0;
max-height:0;
overflow:hidden;
background:#222;
color:white;
border:1px solid #444;
border-radius:6px;
padding:0 12px;
font-size:14px;
font-family:system-ui;
cursor:pointer;
text-align:center;
opacity:0;
pointer-events:none;
transition:opacity 0.3s ease, max-height 0.3s ease, margin-top 0.3s ease, padding 0.3s ease;
}

#format:focus{
outline:none;
border-color:#888;
}

#gear{
position:fixed;
bottom:12px;
right:12px;
font-size:24px;
cursor:pointer;
opacity:.1;
transition:opacity 0.2s ease;
}

#gear:hover{opacity:.8;
}

#configModal{

display:none;
position:fixed;
bottom:60px;
right:20px;

background:#1e1e1e;
padding:18px;
border-radius:10px;
width:300px;

}

label{
display:block;
margin-top:10px;
font-size:13px;
}

input,select{
/*width:100%;*/
padding:6px;
margin-top:4px;
}

.row{
display:flex;
gap:6px;
}

.row input{
flex:1;
}

</style>

</head>

<body>

<div class="wrapper">
<div id="timer">--</div>
<div id="status"></div>
<select id="format">
<option value="wd">Weeks, Days</option>
<option value="wdh">Weeks, Days, Hours</option>
<option value="dh">Days, Hours</option>
<option value="hm">Hours, Minutes</option>
<option value="hms" selected>Hours, Minutes, Seconds</option>
</select>
</div>

<div id="gear">⚙</div>

<div id="configModal">

<label>End date</label>
<input id="endDate" type="datetime-local">

<label>
<input type="checkbox" id="fullDays" value="true"> Count full days
</label>
<div id="segments">
    <label>Morning segment</label>
    <div class="row">
        <input id="start1" type="time" value="08:00">
        <input id="end1" type="time" value="12:00">
    </div>
    <label>Afternoon segment</label>
    <div class="row">
        <input id="start2" type="time" value="13:00">
        <input id="end2" type="time" value="17:00">
    </div>
</div>

<label>
<input type="checkbox" id="excludeHolidays"> Only count workdays (in Sweden)
</label>


</div>

<script>

/* ---------- helpers ---------- */

const STORAGE="workTimerSettings"

function timeToMinutes(t){
let [h,m]=t.split(":").map(Number)
return h*60+m
}

function isWeekend(d){
let day=d.getDay()
return day===0||day===6
}

/* ---------- swedish holidays ---------- */

function easter(y){

let f=Math.floor
let G=y%19
let C=f(y/100)
let H=(C-f(C/4)-f((8*C+13)/25)+19*G+15)%30
let I=H-f(H/28)*(1-f(29/(H+1))*f((21-G)/11))
let J=(y+f(y/4)+I+2-C+f(C/4))%7
let L=I-J
let m=3+f((L+40)/44)
let d=L+28-31*f(m/4)

return new Date(y,m-1,d)

}

function addDays(d,n){

let r=new Date(d)
r.setDate(r.getDate()+n)
return r

}

function midsummerEve(year){

let d=new Date(year,5,19)
while(d.getDay()!=5) d.setDate(d.getDate()+1)
return d

}

function allSaints(year){

let d=new Date(year,9,31)
while(d.getDay()!=6) d.setDate(d.getDate()+1)
return d

}

function holidays(year){

let e=easter(year)

return [

new Date(year,0,1),
new Date(year,0,6),
addDays(e,-2),
addDays(e,1),
new Date(year,4,1),
addDays(e,39),
addDays(e,50),
new Date(year,5,6),
midsummerEve(year),
allSaints(year),
new Date(year,11,25),
new Date(year,11,26)

]

}

function isHoliday(date){

if(!excludeHolidays.checked) return false

let list=holidays(date.getFullYear())

return list.some(h=>
h.getFullYear()==date.getFullYear() &&
h.getMonth()==date.getMonth() &&
h.getDate()==date.getDate()
)

}

/* ---------- work segments ---------- */

function getSegments(){

if(fullDays.checked)
return [[0,1440]]

return [

[timeToMinutes(start1.value),timeToMinutes(end1.value)],
[timeToMinutes(start2.value),timeToMinutes(end2.value)]

]

}

/* ---------- calculation ---------- */

// Count weekdays in [d1, d2) — both dates at midnight — O(1)
function weekdaysBetween(d1,d2){
let days=Math.round((d2-d1)/86400000)
if(days<=0) return 0
let weeks=Math.floor(days/7)
let rem=days%7
let count=weeks*5
let startDay=d1.getDay()
for(let i=0;i<rem;i++){
let day=(startDay+i)%7
if(day!==0&&day!==6) count++
}
return count
}

// Count weekday holidays falling in [d1, d2) — O(years * 12)
function holidaysInRange(d1,d2){
if(!excludeHolidays.checked) return 0
let count=0
for(let y=d1.getFullYear();y<=d2.getFullYear();y++){
for(let h of holidays(y)){
if(h>=d1&&h<d2&&h.getDay()!==0&&h.getDay()!==6) count++
}
}
return count
}

function remainingSeconds(now,end){

if(now>=end) return 0

const segs=getSegments()
const secsPerDay=segs.reduce((sum,seg)=>sum+(seg[1]-seg[0])*60,0)
let total=0

let startDay=new Date(now); startDay.setHours(0,0,0,0)
let endDay=new Date(end);   endDay.setHours(0,0,0,0)

function partialDay(dayDate,from,to){
if(isWeekend(dayDate)||isHoliday(dayDate)) return 0
let s=0
for(let seg of segs){
let segS=new Date(dayDate); segS.setMinutes(seg[0])
let segE=new Date(dayDate); segE.setMinutes(seg[1])
let a=new Date(Math.max(from,segS))
let b=new Date(Math.min(to,segE))
if(b>a) s+=(b-a)/1000
}
return s
}

if(startDay.getTime()===endDay.getTime())
return partialDay(startDay,now,end)

// partial first day
let firstDayEnd=new Date(startDay); firstDayEnd.setDate(firstDayEnd.getDate()+1)
total+=partialDay(startDay,now,firstDayEnd)

// partial last day
total+=partialDay(endDay,endDay,end)

// full days in between [startDay+1, endDay)
let rangeStart=new Date(startDay); rangeStart.setDate(rangeStart.getDate()+1)
if(rangeStart<endDay){
let fullWorkdays=weekdaysBetween(rangeStart,endDay)-holidaysInRange(rangeStart,endDay)
total+=fullWorkdays*secsPerDay
}

return total

}

/* ---------- formatter ---------- */

function formatTime(sec){

const segs=getSegments()
const DAY_SECS=segs.reduce((sum,seg)=>sum+(seg[1]-seg[0])*60,0)
const WEEK_SECS=5*DAY_SECS

const pad = n => String(n).padStart(2,"0")

if(format.value==="hms"){
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
let s=Math.floor(sec%60)
return pad(h)+":"+pad(m)+":"+pad(s)
}

if(format.value==="hm"){
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
return pad(h)+"h "+pad(m)+"m"
}

if(format.value==="dh"){
let d=Math.floor(sec/DAY_SECS)
let h=Math.floor((sec%DAY_SECS)/3600)
return d+"d "+pad(h)+"h"
}

if(format.value==="wdh"){
let w=Math.floor(sec/WEEK_SECS)
let rem=sec%WEEK_SECS
let d=Math.floor(rem/DAY_SECS)
let h=Math.floor((rem%DAY_SECS)/3600)
return w+"w "+d+"d "+pad(h)+"h"
}

let w=Math.floor(sec/WEEK_SECS)
let rem=sec%WEEK_SECS
let d=Math.floor(rem/DAY_SECS)
return w+"w "+d+"d"

}

/* ---------- scaling ---------- */

function autoScale(){

let size=Math.min(window.innerWidth,window.innerHeight*1.5)

timer.style.fontSize=size+"px"

while(timer.scrollWidth>window.innerWidth*0.9||timer.offsetHeight>window.innerHeight*0.7){

size-=4
timer.style.fontSize=size+"px"

}

}

/* ---------- URL handling ---------- */

function readHash(){

if(!location.hash) return null

let p=new URLSearchParams(location.hash.slice(1))

return{

endDate:p.get("end"),
start1:p.get("s1"),
end1:p.get("e1"),
start2:p.get("s2"),
end2:p.get("e2"),
fullDays:p.get("fullDays")==="true",
excludeHolidays:p.get("holidays")==="true",
format:p.get("format")

}

}

function writeHash(){

let p=new URLSearchParams()

p.set("end",endDate.value)
p.set("s1",start1.value)
p.set("e1",end1.value)
p.set("s2",start2.value)
p.set("e2",end2.value)
p.set("fullDays",fullDays.checked)
p.set("holidays",excludeHolidays.checked)
p.set("format",format.value)

location.hash=p.toString()

}

/* ---------- persistence ---------- */

function save(){

let s={

endDate:endDate.value,
start1:start1.value,
end1:end1.value,
start2:start2.value,
end2:end2.value,
fullDays:fullDays.checked,
excludeHolidays:excludeHolidays.checked,
format:format.value

}

localStorage.setItem(STORAGE,JSON.stringify(s))
writeHash()
_lastTimerLen=-1

}

function applySettings(s){

if(s.endDate) endDate.value=s.endDate
if(s.start1) start1.value=s.start1
if(s.end1) end1.value=s.end1
if(s.start2) start2.value=s.start2
if(s.end2) end2.value=s.end2
if(s.format) format.value=s.format

fullDays.checked=!!s.fullDays
excludeHolidays.checked=!!s.excludeHolidays

}

function load(){

let hash=readHash()

if(hash){

applySettings(hash)
return true

}

let s=localStorage.getItem(STORAGE)

if(s){
applySettings(JSON.parse(s))
return true
}

return false

}

/* ---------- UI ---------- */

gear.onclick=(e)=>{

e.stopPropagation()
configModal.style.display=
configModal.style.display==="block"?"none":"block"

}

document.addEventListener("click",(e)=>{
if(configModal.style.display==="block"&&!configModal.contains(e.target)){
configModal.style.display="none"
}
})

function toggleSegments(){
segments.style.display=fullDays.checked?"none":"block"
}

fullDays.addEventListener("change",toggleSegments)
excludeHolidays.addEventListener("change",toggleSegments)
toggleSegments()

const formatEl=document.getElementById("format")

function showFormat(){
formatEl.style.opacity="1"
formatEl.style.maxHeight="50px"
formatEl.style.marginTop="20px"
formatEl.style.padding="6px 12px"
formatEl.style.pointerEvents="auto"
}

function hideFormat(){
formatEl.style.opacity="0"
formatEl.style.maxHeight="0"
formatEl.style.marginTop="0"
formatEl.style.padding="0 12px"
formatEl.style.pointerEvents="none"
}

document.addEventListener("mouseenter",showFormat)
document.addEventListener("mouseleave",hideFormat)

document.addEventListener("touchstart",(e)=>{
if(formatEl.style.opacity==="1"){
if(!formatEl.contains(e.target)) hideFormat()
} else {
showFormat()
}
},{passive:true})

/* ---------- timer ---------- */

let _lastTimerLen=-1

function update(){

if(!endDate.value) return

let now=new Date()
let end=new Date(endDate.value)

let sec=remainingSeconds(now,end)
let text=formatTime(sec)

timer.innerText=text

if(text.length!==_lastTimerLen){
_lastTimerLen=text.length
autoScale()
}

}

/* ---------- init ---------- */

document.querySelectorAll("input,select")
.forEach(el=>el.addEventListener("change",save))

load()

if(!endDate.value) configModal.style.display="block"

setInterval(update,1000)

update()

window.addEventListener("resize",autoScale)

/* ---------- PWA ---------- */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
